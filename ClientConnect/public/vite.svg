<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for the main text -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ff4000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8000;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for the reflection -->
    <linearGradient id="reflectionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0.4" />
      <stop offset="30%" style="stop-color:#ff0080;stop-opacity:0.3" />
      <stop offset="70%" style="stop-color:#ff4000;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff8000;stop-opacity:0.1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    
    <!-- Enhanced glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shadow layer -->
  <text x="16" y="26" font-family="Arial, sans-serif" font-size="40" font-weight="bold" 
        text-anchor="middle" fill="url(#textGradient)" filter="url(#shadow)">
    e.
  </text>
  
  <!-- Main "e." text with glow -->
  <text x="16" y="26" font-family="Arial, sans-serif" font-size="40" font-weight="bold" 
        text-anchor="middle" fill="url(#textGradient)" filter="url(#glow)">
    e.
  </text>
  
  <!-- Reflection with shadow -->
  <text x="16" y="32" font-family="Arial, sans-serif" font-size="40" font-weight="bold" 
        text-anchor="middle" fill="url(#reflectionGradient)" 
        transform="scale(1, -0.3) translate(0, -70)" opacity="0.6" filter="url(#shadow)">
    e.
  </text>
</svg>